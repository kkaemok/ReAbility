name: Release

on:
  push:
    tags:
      - "3.5-snapshot-*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build shadow jar
        run: ./gradlew shadowJar --no-daemon

      - name: Locate release artifact
        id: artifact
        shell: bash
        run: |
          set -euo pipefail
          FILE="$(ls build/libs/*.jar | grep -v -- '-plain\.jar$' | head -n 1)"
          echo "file=$FILE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ReAbility 3.5-SNAPSHOT-1
          tag_name: ${{ github.ref_name }}
          prerelease: true
          files: |
            ${{ steps.artifact.outputs.file }}
          body: |
            ## ReAbility 3.5-SNAPSHOT-1 (Pre-release)

            신규 능력 확장과 밸런스/설명 동기화에 초점을 맞춘 스냅샷 릴리즈입니다.

            ### 주요 변경 사항
            - D 등급 신규 능력 추가: `HUSK`, `DISRUPTOR`, `MICHAEL_JACK`, `FASHION_LEADER`
            - C 등급 신규 능력 추가: `TREASURE_APPRAISER`, `GANGGANGYAKYAK`, `BULLDOZER`
            - 방해꾼(`DISRUPTOR`) 스킬 방해 로직을 웅크리기/우클릭 기반 스킬 트리거에 연동
            - 마이클잭(`MICHAEL_JACK`) 경직 면역을 크로노스 시간 단절과 호환되도록 반영
            - 능력 설명 및 문서(README) 최신화

            ### 빌드 정보
            - Minecraft/Paper: `1.21.11`
            - Java: `21`
            - Artifact: Shadow JAR (`-plain` 제외)
