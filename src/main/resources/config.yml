# ReAbility configuration

world-settings:
  default-max-health: 40.0
  axe-damage-reduction: 2.0
  border:
    min-x: -30000
    min-z: -30000
    max-x: 30000
    max-z: 30000

mining-limits:
  diamond:
    amount: 100
    miner-bonus: 600
    reset-interval-ticks: 72000
  ancient-debris:
    amount: 2
    miner-bonus: 5
    reset-interval-ticks: 216000

ability-settings:
  auto-reroll-hours: 24
  durations:
    D: 86400000
    C: 86400000
    B: 86400000
    A: 86400000
    S: 86400000
    S_PLUS: 86400000
    SS: 86400000

teleport-settings:
  tpa-cooldown-default: 180
  tpa-cooldown-homelover: 60
  rtp-cooldown-default: 600
  rtp-cooldown-space-lord: 60
  tpa-request-timeout-seconds: 60

messages:
  prefix: "<gold>[ReAbility] <white>"
  reroll-announce: "<yellow>오늘은 <white>%ability% <yellow>능력이 지급되었습니다"

