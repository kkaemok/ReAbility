name: ReAbility
version: '${version}'
author: kkaemok
description: 다양한 능력 시스템을 기반으로 PvP와 생존 요소를 확장하는 마인크래프트 능력 플러그인.
main: org.kkaemok.reAbility.ReAbility
api-version: '1.21'
depend: [LuckPerms, ProtocolLib]
softdepend: [nicknames, TAB]

commands:
  reabilityadmin:
    description: 관리자 명령어
    usage: /레능 <하위명령어>
    aliases: [레능]
  ability:
    description: 플레이어 능력 명령어
    usage: /능력 <하위명령어>
    aliases: [능력]
  cutecute:
    description: 큐트큐트 표시 설정 명령어
    usage: /큐트큐트 <리스트설정|설명설정> <온|오프>
    aliases: [큐트큐트]
  owner:
    description: 강아지 주인 설정 명령어
    usage: /주인 <설정|해제> [플레이어]
    aliases: [주인]
  shop:
    description: 기본 상점 명령어
    usage: /상점
    aliases: [상점]
  usermarket:
    description: 유저 상점 명령어
    usage: /유저상점 [페이지]
    aliases: [유저상점]
  sell:
    description: 판매 GUI 열기
    usage: /팔기
    aliases: [팔기]
  setprice:
    description: 판매 가격 설정
    usage: /가격설정 <가격>
    aliases: [가격설정]
  soul:
    description: 네크로맨서 영혼 명령어
    usage: /영혼 <상점|상태>
    aliases: [영혼]
  sethome:
    description: 홈 설정 명령어
    usage: /sethome <이름>
    aliases: [홈설정]
  home:
    description: 홈 이동 명령어
    usage: /home <이름>
    aliases: [홈]
  delhome:
    description: 홈 삭제 명령어
    usage: /delhome <이름>
    aliases: [홈삭제]
  homelist:
    description: 홈 목록 명령어
    usage: /homelist
    aliases: [홈목록]
  homeadd:
    description: 홈 제한 추가 명령어
    usage: /homeadd <플레이어>
    aliases: [홈셋추가]
  guild:
    description: 길드 관리 명령어
    usage: /길드 <하위명령어>
    aliases: [길드]
  guildchat:
    description: 길드챗 토글
    usage: /길드챗
    aliases: [길드챗]
  rtp:
    description: 랜덤 텔레포트 명령어
    usage: /rtp
    aliases: [랜덤텔포]
  tpa:
    description: 텔레포트 요청 명령어
    usage: /tpa <플레이어>
    aliases: [티피요청]
  tphere:
    description: 상대를 내 위치로 요청
    usage: /tphere <플레이어>
    aliases: [티피여기]
  tpaccept:
    description: 텔포 요청 수락
    usage: /tpaccept <플레이어>
    aliases: [티피수락]
  tpadeny:
    description: 텔포 요청 거절
    usage: /tpadeny <플레이어>
    aliases: [티피거절]
  tpacancel:
    description: 보낸 텔포 요청 취소
    usage: /tpacancel [플레이어]
    aliases: [tpac, 티피취소]
